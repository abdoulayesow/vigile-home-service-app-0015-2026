<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vigile by Ablo — Home Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif&display=swap" rel="stylesheet">
  <style>
    /* ─── Design Tokens ─────────────────────────────────────────────── */
    :root {
      --bg:            #0a0f0d;
      --surface:       rgba(255,255,255,0.03);
      --surface-hover: rgba(255,255,255,0.06);
      --border:        rgba(255,255,255,0.07);
      --border-hover:  rgba(255,255,255,0.14);
      --text:          #f0f5f2;
      --text-muted:    #94a8a0;
      --text-dim:      #4a5e56;
      --accent:        #34d399;
      --accent-dark:   #1a7a50;
      --accent-glow:   rgba(52,211,153,0.25);
      --amber:         #f59e0b;
      --amber-glow:    rgba(245,158,11,0.20);
      --font-display:  'Instrument Serif', Georgia, serif;
      --font-body:     'DM Sans', system-ui, -apple-system, sans-serif;
      --radius:        14px;
      --transition:    0.28s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ─── Deep Gradient Background ─────────────────────────────────── */
    body {
      background:
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(16,40,28,0.5) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(10,30,22,0.4) 0%, transparent 60%),
        var(--bg);
    }

    /* SVG noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
      z-index: 0;
    }

    /* Dot grid overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Ambient Orbs ─────────────────────────────────────────────── */
    .ambient-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      will-change: transform;
    }
    .orb-emerald {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(52,211,153,0.12) 0%, transparent 70%);
      top: -10%;
      left: -10%;
      animation: drift1 25s ease-in-out infinite;
    }
    .orb-teal {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(45,180,160,0.09) 0%, transparent 70%);
      bottom: -5%;
      right: -15%;
      animation: drift2 30s ease-in-out infinite;
    }
    .orb-amber {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
      top: 40%;
      left: 60%;
      animation: drift3 22s ease-in-out infinite;
    }

    @keyframes drift1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(80px, 60px) scale(1.1); }
      66%      { transform: translate(-40px, 30px) scale(0.95); }
    }
    @keyframes drift2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(-60px, -40px) scale(1.08); }
      66%      { transform: translate(30px, -60px) scale(0.92); }
    }
    @keyframes drift3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(-80px, 50px) scale(1.15); }
    }

    /* ─── Screen Management ─────────────────────────────────────────── */
    .screen {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeSlideUp 0.6s var(--transition) forwards;
    }
    .screen.hidden { display: none; }
    @keyframes fadeSlideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── PIN Screen ────────────────────────────────────────────────── */
    #pin-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0;
      padding: 40px 24px;
    }

    .pin-shell {
      width: 100%;
      max-width: 380px;
      text-align: center;
    }

    .pin-home-icon {
      font-size: 56px;
      display: block;
      margin-bottom: 24px;
      position: relative;
      animation: pulseGlow 4s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 20px var(--accent-glow)) drop-shadow(0 0 60px rgba(52,211,153,0.1)); }
      50%      { filter: drop-shadow(0 0 40px rgba(52,211,153,0.45)) drop-shadow(0 0 80px rgba(52,211,153,0.2)); }
    }

    .pin-wordmark {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 400;
      color: #fff;
      margin-bottom: 8px;
      text-shadow: 0 0 40px rgba(52,211,153,0.15);
    }

    .pin-tagline {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 48px;
    }

    .pin-divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
      margin: 0 auto 40px;
    }

    .pin-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    #pin-input {
      width: 100%;
      padding: 18px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: #fff;
      font-family: var(--font-body);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 16px;
      text-align: center;
      outline: none;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: border-color var(--transition), box-shadow var(--transition);
      margin-bottom: 16px;
    }
    #pin-input:focus {
      border-color: var(--accent-dark);
      box-shadow:
        0 0 0 3px var(--accent-glow),
        0 0 30px var(--accent-glow),
        inset 0 0 20px rgba(52,211,153,0.05);
    }
    #pin-input.pin-error {
      border-color: #e53e3e;
      box-shadow: 0 0 0 3px rgba(229,62,62,0.2);
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    #unlock-btn {
      width: 100%;
      padding: 16px 24px;
      background: linear-gradient(135deg, var(--accent-dark), var(--accent));
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: box-shadow var(--transition), transform 0.1s;
      position: relative;
      overflow: hidden;
    }
    #unlock-btn::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s ease;
    }
    #unlock-btn:hover {
      box-shadow: 0 4px 30px var(--accent-glow), 0 0 60px rgba(52,211,153,0.15);
    }
    #unlock-btn:hover::after {
      left: 100%;
    }
    #unlock-btn:active { transform: scale(0.98); }

    #pin-error-msg {
      margin-top: 14px;
      font-size: 12px;
      color: #fc8181;
      letter-spacing: 0.5px;
      min-height: 18px;
    }

    /* ─── Dashboard Screen ──────────────────────────────────────────── */
    #dashboard {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* Header */
    .dash-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 40px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .dash-wordmark {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 400;
      color: #fff;
      letter-spacing: 0;
      margin-bottom: 6px;
      text-shadow: 0 0 30px rgba(52,211,153,0.12);
    }

    .dash-subtitle {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .dash-season-pill {
      display: inline-block;
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 99px;
      padding: 3px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .dash-generated {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .logout-btn {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-muted);
      padding: 8px 16px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      transition: border-color var(--transition), color var(--transition), background var(--transition), box-shadow var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-top: 4px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .logout-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }

    /* Progress */
    .progress-wrap {
      margin-bottom: 32px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .progress-label-text {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .progress-count {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
    }

    .progress-track {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #2dd4bf);
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 0 12px var(--accent-glow), 0 0 4px var(--accent-glow);
      animation: progressPulse 2s ease-in-out infinite;
    }
    @keyframes progressPulse {
      0%, 100% { box-shadow: 0 0 12px var(--accent-glow), 0 0 4px var(--accent-glow); }
      50%      { box-shadow: 0 0 20px var(--accent-glow), 0 0 8px var(--accent-glow); }
    }

    /* Loading / Error States */
    .state-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }
    .state-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 8px;
    }
    .state-msg {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 320px;
      line-height: 1.6;
    }

    .retry-btn {
      margin-top: 24px;
      padding: 10px 24px;
      background: none;
      border: 1px solid rgba(52,211,153,0.3);
      border-radius: 10px;
      color: var(--accent);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
    }
    .retry-btn:hover {
      background: rgba(52,211,153,0.1);
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(52,211,153,0.1);
    }

    /* ─── Section Cards ────────────────────────────────────────────── */
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px 22px 28px;
      transition:
        transform var(--transition),
        border-color var(--transition),
        background var(--transition),
        box-shadow var(--transition),
        filter var(--transition);
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
    }

    /* Glowing accent bar (left edge) */
    .section-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 12px;
      bottom: 12px;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: var(--accent-color, #555);
      box-shadow: 0 0 12px var(--accent-color, transparent), 0 0 4px var(--accent-color, transparent);
      opacity: 0.8;
      transition: opacity var(--transition), box-shadow var(--transition);
    }

    /* Top highlight edge */
    .section-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 20px;
      right: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
    }

    .section-card:hover {
      transform: translateY(-2px);
      border-color: var(--border-hover);
      background: var(--surface-hover);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
    }
    .section-card:hover::before {
      opacity: 1;
      box-shadow: 0 0 20px var(--accent-color, transparent), 0 0 8px var(--accent-color, transparent);
    }

    .section-card.reviewed {
      filter: saturate(0.3) brightness(0.7);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .card-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .card-emoji {
      font-size: 20px;
      flex-shrink: 0;
      line-height: 1;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.3;
    }

    .card-badge {
      font-family: var(--font-body);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 99px;
      color: #fff;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 2px;
      box-shadow: 0 0 12px rgba(0,0,0,0.2);
    }

    .card-body {
      font-size: 14px;
      color: rgba(240,245,242,0.65);
      line-height: 1.7;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .review-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }
    .review-label span {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color var(--transition);
    }
    .review-label:hover span { color: var(--accent); }

    .custom-checkbox {
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--border-hover);
      border-radius: 6px;
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
      flex-shrink: 0;
    }
    .review-label:hover .custom-checkbox {
      border-color: var(--accent);
    }
    .custom-checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }
    .custom-checkbox .check-icon {
      display: none;
      color: #fff;
      font-size: 12px;
      line-height: 1;
    }
    .custom-checkbox.checked .check-icon { display: block; }

    /* Footer */
    .dash-footer {
      text-align: center;
      padding-top: 48px;
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ─── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .dash-header { flex-direction: column; gap: 16px; }
      .logout-btn { align-self: flex-start; }
      .pin-wordmark { font-size: 26px; }
      #pin-input { font-size: 22px; letter-spacing: 12px; }
      .orb-emerald { width: 350px; height: 350px; }
      .orb-teal { width: 300px; height: 300px; }
      .orb-amber { width: 250px; height: 250px; }
    }

    /* ─── Reduced Motion ─────────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .ambient-orb { animation: none !important; }
      .pin-home-icon { animation: none !important; }
      .progress-fill { animation: none !important; }
      #unlock-btn::after { transition: none !important; }
      .screen { animation-duration: 0.01ms !important; }
      .section-card { transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <!-- ─── Ambient Orbs ───────────────────────────────────────── -->
  <div class="ambient-orb orb-emerald" aria-hidden="true"></div>
  <div class="ambient-orb orb-teal" aria-hidden="true"></div>
  <div class="ambient-orb orb-amber" aria-hidden="true"></div>

  <!-- ─── PIN Screen ───────────────────────────────────────── -->
  <div id="pin-screen" class="screen">
    <div class="pin-shell">
      <span class="pin-home-icon">🏠</span>
      <h1 class="pin-wordmark">Vigile by Ablo</h1>
      <p class="pin-tagline">Your home, looked after.</p>
      <div class="pin-divider"></div>
      <p class="pin-label">Enter PIN to unlock</p>
      <input
        id="pin-input"
        type="password"
        maxlength="6"
        inputmode="numeric"
        autocomplete="off"
        placeholder="······"
        aria-label="6-digit PIN"
      >
      <button id="unlock-btn">Unlock</button>
      <p id="pin-error-msg" role="alert"></p>
    </div>
  </div>

  <!-- ─── Dashboard Screen ─────────────────────────────────── -->
  <div id="dashboard" class="screen hidden">

    <header class="dash-header">
      <div>
        <h1 class="dash-wordmark">🏠 Vigile by Ablo</h1>
        <div class="dash-subtitle" id="dash-subtitle">Loading…</div>
        <div class="dash-generated" id="dash-generated"></div>
      </div>
      <button class="logout-btn" id="logout-btn" title="Lock dashboard">
        🔒 Lock
      </button>
    </header>

    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-label">
        <span class="progress-label-text">Sections reviewed</span>
        <span class="progress-count" id="progress-count">0 / 0</span>
      </div>
      <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuenow="0" aria-valuemax="0" aria-label="Sections reviewed">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div id="cards-area"></div>

    <footer class="dash-footer">Powered by Vigile by Ablo</footer>
  </div>

  <script>
    // ─── Configuration ─────────────────────────────────────────────────────────
    // TODO: Replace with your GitHub username and the ID of your secret Gist.
    // The Gist must contain a file named "vigile-brief.json" (written by the
    // monthly GitHub Actions job). You can find the Gist ID in its URL:
    //   https://gist.github.com/YOUR_USERNAME/GIST_ID_HERE
    const GIST_OWNER = 'abdoulayesow';
    const GIST_ID    = '559f287f376fb52d5c4951a1ef7415c6';

    // ─── PIN Hash ──────────────────────────────────────────────────────────────
    // Default PIN is 1234. NEVER store the raw PIN here.
    // To change PIN: run  echo -n "YOURPIN" | sha256sum  and replace this constant.
    const PIN_HASH = 'bc95ea916554990f02ff89b6dfa351ce88ad19844b5abfc6fea01d49650b8b1a';

    // ─── DOM refs ──────────────────────────────────────────────────────────────
    const pinScreen   = document.getElementById('pin-screen');
    const dashboard   = document.getElementById('dashboard');
    const pinInput    = document.getElementById('pin-input');
    const unlockBtn   = document.getElementById('unlock-btn');
    const pinErrorMsg = document.getElementById('pin-error-msg');
    const logoutBtn   = document.getElementById('logout-btn');
    const cardsArea   = document.getElementById('cards-area');
    const dashSubtitle  = document.getElementById('dash-subtitle');
    const dashGenerated = document.getElementById('dash-generated');
    const progressWrap  = document.getElementById('progress-wrap');
    const progressCount = document.getElementById('progress-count');
    const progressFill  = document.getElementById('progress-fill');

    // ─── Utilities ─────────────────────────────────────────────────────────────
    async function sha256hex(str) {
      const buf = await crypto.subtle.digest(
        'SHA-256',
        new TextEncoder().encode(str)
      );
      return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    }

    function formatGeneratedAt(iso) {
      try {
        const d = new Date(iso);
        return 'Generated ' + d.toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric'
        });
      } catch { return ''; }
    }

    function storageKey(year, month, emoji) {
      return `vigile-${year}-${month}-${emoji ?? 'none'}`;
    }

    // ─── Screen transitions ─────────────────────────────────────────────────────
    function showDashboard() {
      pinScreen.classList.add('hidden');
      dashboard.classList.remove('hidden');
      // Re-trigger animation
      dashboard.style.animation = 'none';
      requestAnimationFrame(() => {
        dashboard.style.animation = '';
      });
      loadBrief();
      logoutBtn.focus();
    }

    function showPin() {
      dashboard.classList.add('hidden');
      pinScreen.classList.remove('hidden');
      pinScreen.style.animation = 'none';
      requestAnimationFrame(() => {
        pinScreen.style.animation = '';
      });
      pinInput.value = '';
      pinErrorMsg.textContent = '';
    }

    // ─── PIN logic ─────────────────────────────────────────────────────────────
    async function attemptUnlock() {
      const entered = pinInput.value.trim();
      if (entered.length === 0) return;

      if (!crypto?.subtle) {
        pinErrorMsg.textContent = 'Secure context required — open via HTTPS or localhost.';
        return;
      }

      try {
        const hash = await sha256hex(entered);
        if (hash === PIN_HASH) {
          sessionStorage.setItem('vigile_unlocked', '1');
          showDashboard();
        } else {
          pinInput.classList.add('pin-error');
          pinErrorMsg.textContent = 'Incorrect PIN — try again.';
          pinInput.value = '';
          setTimeout(() => {
            pinInput.classList.remove('pin-error');
          }, 600);
        }
      } catch (err) {
        console.error('PIN verification failed:', err);
        pinErrorMsg.textContent = 'Something went wrong — please try again.';
      }
    }

    unlockBtn.addEventListener('click', attemptUnlock);
    pinInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') attemptUnlock();
      // Clear error on new input
      pinErrorMsg.textContent = '';
      pinInput.classList.remove('pin-error');
    });

    logoutBtn.addEventListener('click', () => {
      sessionStorage.removeItem('vigile_unlocked');
      showPin();
    });

    // ─── Data loading ──────────────────────────────────────────────────────────
    function renderLoading() {
      progressWrap.style.display = 'none';
      cardsArea.innerHTML = `
        <div class="state-card">
          <div class="spinner"></div>
          <div class="state-title">Loading brief…</div>
          <div class="state-msg">Fetching your home brief from the cloud.</div>
        </div>`;
    }

    function renderError() {
      progressWrap.style.display = 'none';
      cardsArea.innerHTML = `
        <div class="state-card">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Could not load brief</div>
          <div class="state-msg">
            Check your Gist configuration — make sure <code>GIST_OWNER</code> and
            <code>GIST_ID</code> are set correctly in <code>docs/index.html</code>.
          </div>
          <button class="retry-btn" id="retry-btn">Retry</button>
        </div>`;
      document.getElementById('retry-btn').addEventListener('click', loadBrief);
    }

    function renderEmpty() {
      progressWrap.style.display = 'none';
      cardsArea.innerHTML = `
        <div class="state-card">
          <div class="state-icon">🗓️</div>
          <div class="state-title">No brief available yet</div>
          <div class="state-msg">
            The next brief will be generated on the 1st of next month.
            Check back then!
          </div>
        </div>`;
    }

    async function loadBrief() {
      if (GIST_OWNER === 'YOUR_GITHUB_USERNAME' || GIST_ID === 'YOUR_GIST_ID') {
        progressWrap.style.display = 'none';
        cardsArea.innerHTML = `
          <div class="state-card">
            <div class="state-icon">🛠️</div>
            <div class="state-title">Setup required</div>
            <div class="state-msg">
              Open <code>docs/index.html</code> and replace <code>GIST_OWNER</code>
              and <code>GIST_ID</code> at the top of the script with your GitHub
              username and Gist ID.
            </div>
          </div>`;
        return;
      }

      renderLoading();
      dashSubtitle.textContent = 'Loading…';
      dashGenerated.textContent = '';

      const url = `https://gist.githubusercontent.com/${GIST_OWNER}/${GIST_ID}/raw/vigile-brief.json`;

      let data;
      try {
        // Cache-bust so we always get the latest
        const res = await fetch(url + '?t=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (err) {
        console.error('Gist fetch failed:', err);
        renderError();
        return;
      }

      if (!data || !Array.isArray(data.sections) || data.sections.length === 0) {
        renderEmpty();
        return;
      }

      // Header — show season as pill badge
      const seasonPill = `<span class="dash-season-pill">${data.season}</span>`;
      dashSubtitle.innerHTML = `${data.month} ${data.year} · ${seasonPill}`;
      dashGenerated.textContent = formatGeneratedAt(data.generated_at);

      // Cards
      renderCards(data.sections, data.year, data.month);
    }

    // ─── Card rendering & progress ─────────────────────────────────────────────
    function renderCards(sections, year, month) {
      progressWrap.style.display = '';
      cardsArea.innerHTML = '';

      const grid = document.createElement('div');
      grid.className = 'cards-grid';

      sections.forEach((sec, idx) => {
        const card = buildCard(sec, year, month, idx);
        grid.appendChild(card);
      });

      cardsArea.appendChild(grid);
      updateProgress(sections, year, month);
    }

    function buildCard(sec, year, month, idx) {
      const { emoji, color, badge, content } = sec;
      const key = storageKey(year, month, emoji);
      const isReviewed = localStorage.getItem(key) === '1';

      const card = document.createElement('div');
      card.className = 'section-card' + (isReviewed ? ' reviewed' : '');
      card.style.setProperty('--accent-color', color || '#555');
      // Staggered entrance — scale from 0.97 + fade
      card.style.opacity = '0';
      card.style.transform = 'translateY(12px) scale(0.97)';
      card.style.transition = `opacity 0.45s cubic-bezier(0.16,1,0.3,1) ${idx * 0.07}s, transform 0.45s cubic-bezier(0.16,1,0.3,1) ${idx * 0.07}s, border-color 0.28s, background 0.28s, box-shadow 0.28s, filter 0.28s`;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        card.style.opacity = '';
        card.style.transform = '';
      }));

      // Split content: first line is the heading, rest is body
      const lines = content ? content.split('<br>') : [];
      const heading = lines[0] || '';
      const body = lines.slice(1).join('<br>') || '';

      // Top row
      const topRow = document.createElement('div');
      topRow.className = 'card-top';

      const titleRow = document.createElement('div');
      titleRow.className = 'card-title-row';

      if (emoji) {
        const emojiEl = document.createElement('span');
        emojiEl.className = 'card-emoji';
        emojiEl.textContent = emoji;
        titleRow.appendChild(emojiEl);
      }

      const titleEl = document.createElement('h2');
      titleEl.className = 'card-title';
      titleEl.textContent = heading;
      titleRow.appendChild(titleEl);

      topRow.appendChild(titleRow);

      if (badge) {
        const badgeEl = document.createElement('span');
        badgeEl.className = 'card-badge';
        badgeEl.textContent = badge;
        badgeEl.style.background = color || '#555';
        topRow.appendChild(badgeEl);
      }

      card.appendChild(topRow);

      if (body) {
        const bodyEl = document.createElement('div');
        bodyEl.className = 'card-body';
        // Content is HTML-escaped plain text with <br> tags only — safe to use
        bodyEl.innerHTML = body;
        card.appendChild(bodyEl);
      }

      // Footer with checkbox
      const footer = document.createElement('div');
      footer.className = 'card-footer';

      const label = document.createElement('label');
      label.className = 'review-label';

      const checkbox = document.createElement('div');
      checkbox.className = 'custom-checkbox' + (isReviewed ? ' checked' : '');
      checkbox.setAttribute('role', 'checkbox');
      checkbox.setAttribute('aria-checked', String(isReviewed));
      checkbox.setAttribute('tabindex', '0');
      checkbox.innerHTML = '<span class="check-icon">✓</span>';

      const labelText = document.createElement('span');
      labelText.textContent = isReviewed ? 'Reviewed' : 'Mark reviewed';

      label.appendChild(checkbox);
      label.appendChild(labelText);
      label.style.cursor = 'pointer';

      function toggleReview() {
        const nowReviewed = !checkbox.classList.contains('checked');
        checkbox.classList.toggle('checked', nowReviewed);
        checkbox.setAttribute('aria-checked', String(nowReviewed));
        card.classList.toggle('reviewed', nowReviewed);
        labelText.textContent = nowReviewed ? 'Reviewed' : 'Mark reviewed';

        if (nowReviewed) {
          localStorage.setItem(key, '1');
        } else {
          localStorage.removeItem(key);
        }

        // Re-count progress from DOM
        updateProgressFromDOM();
      }

      label.addEventListener('click', toggleReview);
      checkbox.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          toggleReview();
        }
      });

      footer.appendChild(label);
      card.appendChild(footer);

      return card;
    }

    function updateProgress(sections, year, month) {
      const total = sections.length;
      const done  = sections.filter(s =>
        localStorage.getItem(storageKey(year, month, s.emoji)) === '1'
      ).length;
      setProgress(done, total);
    }

    function updateProgressFromDOM() {
      const all      = document.querySelectorAll('.section-card');
      const reviewed = document.querySelectorAll('.section-card.reviewed');
      setProgress(reviewed.length, all.length);
    }

    function setProgress(done, total) {
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      progressCount.textContent = `${done} / ${total}`;
      progressFill.style.width = pct + '%';
      const track = progressFill.parentElement;
      track.setAttribute('aria-valuenow', String(done));
      track.setAttribute('aria-valuemax', String(total));
    }

    // ─── Boot ──────────────────────────────────────────────────────────────────
    if (sessionStorage.getItem('vigile_unlocked') === '1') {
      pinScreen.classList.add('hidden');
      dashboard.classList.remove('hidden');
      loadBrief();
    } else {
      // PIN screen is already visible; focus input
      requestAnimationFrame(() => pinInput.focus());
    }
  </script>
</body>
</html>
