<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vigile by Ablo — Home Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ─── Design Tokens ─────────────────────────────────────────────── */
    :root {
      --bg:            #080e0b;
      --surface:       rgba(255,255,255,0.04);
      --border:        rgba(255,255,255,0.08);
      --border-hover:  rgba(255,255,255,0.14);
      --text:          #e8f0ec;
      --text-muted:    #6b8578;
      --text-dim:      #3d5447;
      --green-dark:    #2d6a4f;
      --green:         #38a169;
      --green-glow:    rgba(56,161,105,0.25);
      --font-display:  'Syne', system-ui, -apple-system, sans-serif;
      --font-body:     system-ui, -apple-system, Arial, sans-serif;
      --radius:        10px;
      --transition:    0.22s cubic-bezier(0.4,0,0.2,1);
    }

    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 256px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Screen Management ─────────────────────────────────────────── */
    .screen {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeIn 0.45s var(--transition) forwards;
    }
    .screen.hidden { display: none; }
    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── PIN Screen ────────────────────────────────────────────────── */
    #pin-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0;
      padding: 40px 24px;
    }

    .pin-shell {
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .pin-home-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 24px var(--green-glow));
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 20px var(--green-glow)); }
      50%       { filter: drop-shadow(0 0 36px rgba(56,161,105,0.4)); }
    }

    .pin-wordmark {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: #fff;
      margin-bottom: 6px;
    }

    .pin-tagline {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 48px;
    }

    .pin-divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 40px;
    }

    .pin-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    #pin-input {
      width: 100%;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: #fff;
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 16px;
      text-align: center;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      margin-bottom: 16px;
    }
    #pin-input:focus {
      border-color: var(--green-dark);
      box-shadow: 0 0 0 3px var(--green-glow), 0 0 20px var(--green-glow);
    }
    #pin-input.pin-error {
      border-color: #e53e3e;
      box-shadow: 0 0 0 3px rgba(229,62,62,0.2);
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    #unlock-btn {
      width: 100%;
      padding: 14px 24px;
      background: var(--green-dark);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition), transform 0.1s;
    }
    #unlock-btn:hover {
      background: var(--green);
      box-shadow: 0 4px 20px var(--green-glow);
    }
    #unlock-btn:active { transform: scale(0.98); }

    #pin-error-msg {
      margin-top: 14px;
      font-size: 12px;
      color: #fc8181;
      letter-spacing: 0.5px;
      min-height: 18px;
    }

    /* ─── Dashboard Screen ──────────────────────────────────────────── */
    #dashboard {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* Header */
    .dash-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 40px 0 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    .dash-wordmark {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .dash-subtitle {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      color: var(--green);
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .dash-generated {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
      transition: border-color var(--transition), color var(--transition), background var(--transition);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .logout-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
      background: var(--surface);
    }

    /* Progress */
    .progress-wrap {
      margin-bottom: 32px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .progress-label-text {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .progress-count {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      color: var(--green);
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 99px;
      transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 8px var(--green-glow);
    }

    /* Loading / Error States */
    .state-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .state-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }
    .state-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .state-msg {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 320px;
      line-height: 1.6;
    }

    .retry-btn {
      margin-top: 24px;
      padding: 10px 24px;
      background: none;
      border: 1px solid var(--green-dark);
      border-radius: 8px;
      color: var(--green);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition);
    }
    .retry-btn:hover {
      background: var(--green-dark);
      color: #fff;
    }

    /* Section Cards */
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-left: 5px solid var(--accent-color, #444);
      padding: 20px 20px 20px 24px;
      transition: border-color var(--transition), background var(--transition), opacity var(--transition);
      position: relative;
      overflow: hidden;
    }
    .section-card:hover {
      border-color: var(--border-hover);
      background: rgba(255,255,255,0.06);
    }
    .section-card.reviewed {
      opacity: 0.45;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .card-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .card-emoji {
      font-size: 18px;
      flex-shrink: 0;
      line-height: 1;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .card-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      color: #fff;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 2px;
    }

    .card-body {
      font-size: 14px;
      color: rgba(232,240,236,0.75);
      line-height: 1.65;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .review-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }
    .review-label span {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      transition: color var(--transition);
    }
    .review-label:hover span { color: var(--green); }

    .custom-checkbox {
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--border-hover);
      border-radius: 5px;
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color var(--transition), background var(--transition);
      flex-shrink: 0;
    }
    .review-label:hover .custom-checkbox {
      border-color: var(--green);
    }
    .custom-checkbox.checked {
      background: var(--green);
      border-color: var(--green);
    }
    .custom-checkbox .check-icon {
      display: none;
      color: #fff;
      font-size: 12px;
      line-height: 1;
    }
    .custom-checkbox.checked .check-icon { display: block; }

    /* Footer */
    .dash-footer {
      text-align: center;
      padding-top: 48px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ─── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .dash-header { flex-direction: column; gap: 16px; }
      .logout-btn { align-self: flex-start; }
      .pin-wordmark { font-size: 22px; }
      #pin-input { font-size: 22px; letter-spacing: 12px; }
    }
  </style>
</head>
<body>

  <!-- ─── PIN Screen ───────────────────────────────────────── -->
  <div id="pin-screen" class="screen">
    <div class="pin-shell">
      <span class="pin-home-icon">🏠</span>
      <h1 class="pin-wordmark">Vigile by Ablo</h1>
      <p class="pin-tagline">Your home, looked after.</p>
      <div class="pin-divider"></div>
      <p class="pin-label">Enter PIN to unlock</p>
      <input
        id="pin-input"
        type="password"
        maxlength="4"
        inputmode="numeric"
        autocomplete="off"
        placeholder="····"
        aria-label="4-digit PIN"
      >
      <button id="unlock-btn">Unlock</button>
      <p id="pin-error-msg" role="alert" aria-live="polite"></p>
    </div>
  </div>

  <!-- ─── Dashboard Screen ─────────────────────────────────── -->
  <div id="dashboard" class="screen hidden">

    <header class="dash-header">
      <div>
        <div class="dash-wordmark">🏠 Vigile by Ablo</div>
        <div class="dash-subtitle" id="dash-subtitle">Loading…</div>
        <div class="dash-generated" id="dash-generated"></div>
      </div>
      <button class="logout-btn" id="logout-btn" title="Lock dashboard">
        🔒 Lock
      </button>
    </header>

    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-label">
        <span class="progress-label-text">Sections reviewed</span>
        <span class="progress-count" id="progress-count">0 / 0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div id="cards-area"></div>

    <footer class="dash-footer">Powered by Vigile by Ablo</footer>
  </div>

  <script>
    // ─── Configuration ─────────────────────────────────────────────────────────
    // TODO: Replace with your GitHub username and the ID of your secret Gist.
    // The Gist must contain a file named "vigile-brief.json" (written by the
    // monthly GitHub Actions job). You can find the Gist ID in its URL:
    //   https://gist.github.com/YOUR_USERNAME/GIST_ID_HERE
    const GIST_OWNER = 'abdoulayesow';
    const GIST_ID    = '559f287f376fb52d5c4951a1ef7415c6';

    // ─── PIN Hash ──────────────────────────────────────────────────────────────
    // Default PIN is 1234. NEVER store the raw PIN here.
    // To change PIN: run  echo -n "YOURPIN" | sha256sum  and replace this constant.
    const PIN_HASH = 'bc95ea916554990f02ff89b6dfa351ce88ad19844b5abfc6fea01d49650b8b1a';

    // ─── DOM refs ──────────────────────────────────────────────────────────────
    const pinScreen   = document.getElementById('pin-screen');
    const dashboard   = document.getElementById('dashboard');
    const pinInput    = document.getElementById('pin-input');
    const unlockBtn   = document.getElementById('unlock-btn');
    const pinErrorMsg = document.getElementById('pin-error-msg');
    const logoutBtn   = document.getElementById('logout-btn');
    const cardsArea   = document.getElementById('cards-area');
    const dashSubtitle  = document.getElementById('dash-subtitle');
    const dashGenerated = document.getElementById('dash-generated');
    const progressWrap  = document.getElementById('progress-wrap');
    const progressCount = document.getElementById('progress-count');
    const progressFill  = document.getElementById('progress-fill');

    // ─── Utilities ─────────────────────────────────────────────────────────────
    async function sha256hex(str) {
      const buf = await crypto.subtle.digest(
        'SHA-256',
        new TextEncoder().encode(str)
      );
      return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    }

    function formatGeneratedAt(iso) {
      try {
        const d = new Date(iso);
        return 'Generated ' + d.toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric'
        });
      } catch { return ''; }
    }

    function storageKey(year, month, emoji) {
      return `vigile-${year}-${month}-${emoji ?? 'none'}`;
    }

    // ─── Screen transitions ─────────────────────────────────────────────────────
    function showDashboard() {
      pinScreen.classList.add('hidden');
      dashboard.classList.remove('hidden');
      // Re-trigger animation
      dashboard.style.animation = 'none';
      requestAnimationFrame(() => {
        dashboard.style.animation = '';
      });
      loadBrief();
    }

    function showPin() {
      dashboard.classList.add('hidden');
      pinScreen.classList.remove('hidden');
      pinScreen.style.animation = 'none';
      requestAnimationFrame(() => {
        pinScreen.style.animation = '';
      });
      pinInput.value = '';
      pinErrorMsg.textContent = '';
    }

    // ─── PIN logic ─────────────────────────────────────────────────────────────
    async function attemptUnlock() {
      const entered = pinInput.value.trim();
      if (entered.length === 0) return;

      const hash = await sha256hex(entered);
      if (hash === PIN_HASH) {
        sessionStorage.setItem('vigile_unlocked', '1');
        showDashboard();
      } else {
        pinInput.classList.add('pin-error');
        pinErrorMsg.textContent = 'Incorrect PIN — try again.';
        pinInput.value = '';
        setTimeout(() => {
          pinInput.classList.remove('pin-error');
        }, 600);
      }
    }

    unlockBtn.addEventListener('click', attemptUnlock);
    pinInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') attemptUnlock();
      // Clear error on new input
      pinErrorMsg.textContent = '';
      pinInput.classList.remove('pin-error');
    });

    logoutBtn.addEventListener('click', () => {
      sessionStorage.removeItem('vigile_unlocked');
      showPin();
    });

    // ─── Data loading ──────────────────────────────────────────────────────────
    function renderLoading() {
      progressWrap.style.display = 'none';
      cardsArea.innerHTML = `
        <div class="state-card">
          <div class="spinner"></div>
          <div class="state-title">Loading brief…</div>
          <div class="state-msg">Fetching your home brief from the cloud.</div>
        </div>`;
    }

    function renderError() {
      progressWrap.style.display = 'none';
      cardsArea.innerHTML = `
        <div class="state-card">
          <div class="state-icon">⚠️</div>
          <div class="state-title">Could not load brief</div>
          <div class="state-msg">
            Check your Gist configuration — make sure <code>GIST_OWNER</code> and
            <code>GIST_ID</code> are set correctly in <code>docs/index.html</code>.
          </div>
          <button class="retry-btn" onclick="loadBrief()">Retry</button>
        </div>`;
    }

    function renderEmpty() {
      progressWrap.style.display = 'none';
      cardsArea.innerHTML = `
        <div class="state-card">
          <div class="state-icon">🗓️</div>
          <div class="state-title">No brief available yet</div>
          <div class="state-msg">
            The next brief will be generated on the 1st of next month.
            Check back then!
          </div>
        </div>`;
    }

    async function loadBrief() {
      if (GIST_OWNER === 'YOUR_GITHUB_USERNAME' || GIST_ID === 'YOUR_GIST_ID') {
        progressWrap.style.display = 'none';
        cardsArea.innerHTML = `
          <div class="state-card">
            <div class="state-icon">🛠️</div>
            <div class="state-title">Setup required</div>
            <div class="state-msg">
              Open <code>docs/index.html</code> and replace <code>GIST_OWNER</code>
              and <code>GIST_ID</code> at the top of the script with your GitHub
              username and Gist ID.
            </div>
          </div>`;
        return;
      }

      renderLoading();
      dashSubtitle.textContent = 'Loading…';
      dashGenerated.textContent = '';

      const url = `https://gist.githubusercontent.com/${GIST_OWNER}/${GIST_ID}/raw/vigile-brief.json`;

      let data;
      try {
        // Cache-bust so we always get the latest
        const res = await fetch(url + '?t=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (err) {
        console.error('Gist fetch failed:', err);
        renderError();
        return;
      }

      if (!data || !Array.isArray(data.sections) || data.sections.length === 0) {
        renderEmpty();
        return;
      }

      // Header
      dashSubtitle.textContent = `${data.month} ${data.year} · ${data.season}`;
      dashGenerated.textContent = formatGeneratedAt(data.generated_at);

      // Cards
      renderCards(data.sections, data.year, data.month);
    }

    // ─── Card rendering & progress ─────────────────────────────────────────────
    function renderCards(sections, year, month) {
      progressWrap.style.display = '';
      cardsArea.innerHTML = '';

      const grid = document.createElement('div');
      grid.className = 'cards-grid';

      sections.forEach((sec, idx) => {
        const card = buildCard(sec, year, month, idx);
        grid.appendChild(card);
      });

      cardsArea.appendChild(grid);
      updateProgress(sections, year, month);
    }

    function buildCard(sec, year, month, idx) {
      const { emoji, color, badge, content } = sec;
      const key = storageKey(year, month, emoji);
      const isReviewed = localStorage.getItem(key) === '1';

      const card = document.createElement('div');
      card.className = 'section-card' + (isReviewed ? ' reviewed' : '');
      card.style.setProperty('--accent-color', color || '#444');
      // Staggered entrance
      card.style.opacity = '0';
      card.style.transform = 'translateY(10px)';
      card.style.transition = `opacity 0.35s ease ${idx * 0.06}s, transform 0.35s ease ${idx * 0.06}s, border-color 0.22s, background 0.22s`;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        card.style.opacity = '';
        card.style.transform = '';
      }));

      // Split content: first line is the heading, rest is body
      const lines = content ? content.split('<br>') : [];
      const heading = lines[0] || '';
      const body = lines.slice(1).join('<br>') || '';

      // Top row
      const topRow = document.createElement('div');
      topRow.className = 'card-top';

      const titleRow = document.createElement('div');
      titleRow.className = 'card-title-row';

      if (emoji) {
        const emojiEl = document.createElement('span');
        emojiEl.className = 'card-emoji';
        emojiEl.textContent = emoji;
        titleRow.appendChild(emojiEl);
      }

      const titleEl = document.createElement('div');
      titleEl.className = 'card-title';
      titleEl.textContent = heading;
      titleRow.appendChild(titleEl);

      topRow.appendChild(titleRow);

      if (badge) {
        const badgeEl = document.createElement('span');
        badgeEl.className = 'card-badge';
        badgeEl.textContent = badge;
        badgeEl.style.background = color || '#444';
        topRow.appendChild(badgeEl);
      }

      card.appendChild(topRow);

      if (body) {
        const bodyEl = document.createElement('div');
        bodyEl.className = 'card-body';
        // Content is HTML-escaped plain text with <br> tags only — safe to use
        bodyEl.innerHTML = body;
        card.appendChild(bodyEl);
      }

      // Footer with checkbox
      const footer = document.createElement('div');
      footer.className = 'card-footer';

      const label = document.createElement('label');
      label.className = 'review-label';

      const checkbox = document.createElement('div');
      checkbox.className = 'custom-checkbox' + (isReviewed ? ' checked' : '');
      checkbox.innerHTML = '<span class="check-icon">✓</span>';

      const labelText = document.createElement('span');
      labelText.textContent = isReviewed ? 'Reviewed' : 'Mark reviewed';

      label.appendChild(checkbox);
      label.appendChild(labelText);
      label.style.cursor = 'pointer';

      label.addEventListener('click', () => {
        const nowReviewed = !checkbox.classList.contains('checked');
        checkbox.classList.toggle('checked', nowReviewed);
        card.classList.toggle('reviewed', nowReviewed);
        labelText.textContent = nowReviewed ? 'Reviewed' : 'Mark reviewed';

        if (nowReviewed) {
          localStorage.setItem(key, '1');
        } else {
          localStorage.removeItem(key);
        }

        // Re-count progress from DOM
        updateProgressFromDOM();
      });

      footer.appendChild(label);
      card.appendChild(footer);

      return card;
    }

    function updateProgress(sections, year, month) {
      const total = sections.length;
      const done  = sections.filter(s =>
        localStorage.getItem(storageKey(year, month, s.emoji)) === '1'
      ).length;
      setProgress(done, total);
    }

    function updateProgressFromDOM() {
      const all      = document.querySelectorAll('.section-card');
      const reviewed = document.querySelectorAll('.section-card.reviewed');
      setProgress(reviewed.length, all.length);
    }

    function setProgress(done, total) {
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      progressCount.textContent = `${done} / ${total}`;
      progressFill.style.width = pct + '%';
    }

    // ─── Boot ──────────────────────────────────────────────────────────────────
    if (sessionStorage.getItem('vigile_unlocked') === '1') {
      pinScreen.classList.add('hidden');
      dashboard.classList.remove('hidden');
      loadBrief();
    } else {
      // PIN screen is already visible; focus input
      requestAnimationFrame(() => pinInput.focus());
    }
  </script>
</body>
</html>
